# =============================================================================
# SonarQube scanner configuration
# =============================================================================
# This file is read by `sonar-scanner` and by `make sonar`.
#
# Neither the SonarQube host URL nor the authentication token is stored here.
# Pass them at invocation time via environment variables or CLI flags:
#
#     SONAR_URL=https://sonar.example.com \
#     SONAR_TOKEN=squ_xxxxxxxxxxxxxxxxxxxx \
#     make sonar
#
# or directly:
#
#     sonar-scanner \
#       -Dsonar.host.url="$SONAR_URL" \
#       -Dsonar.token="$SONAR_TOKEN"
# =============================================================================

# Project identification in the SonarQube UI.
sonar.projectKey=sca_tool_evaluation
sonar.projectName=sca_tool_evaluation
sonar.projectVersion=1.0

# -----------------------------------------------------------------------------
# Source layout
# -----------------------------------------------------------------------------
sonar.sources=src
sonar.tests=tests
sonar.sourceEncoding=UTF-8

# -----------------------------------------------------------------------------
# Python
# -----------------------------------------------------------------------------
sonar.language=python
sonar.python.version=3.12

# Path to the XML coverage report produced by:
#   poetry run pytest --cov=src --cov-report=xml:build/coverage/coverage.xml
# or equivalently by `make coverage`.
sonar.python.coverage.reportPaths=build/coverage/coverage.xml

# -----------------------------------------------------------------------------
# Optional: CycloneDX SBOM (used by some SonarQube editions / plugins)
# Produced by `make sbom`.
# -----------------------------------------------------------------------------
#sonar.sbom.jsonReportPath=build/sbom/sbom.json

# -----------------------------------------------------------------------------
# Exclusions
# -----------------------------------------------------------------------------
# Skip generated reports, coverage HTML output, the build directory, the
# virtualenv and tool caches.
sonar.exclusions=build/**,htmlcov/**,.venv/**,.ruff_cache/**,.pytest_cache/**,Reports/**
